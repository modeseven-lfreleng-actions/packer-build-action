version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "CI(actions)"
    # Wait before opening a bump PR so we don't churn on a release
    # that gets retracted or superseded shortly after it ships. This
    # 7-day cooldown is a supply-chain security best practice: it gives
    # time for a bad release to be yanked before we adopt it.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15
