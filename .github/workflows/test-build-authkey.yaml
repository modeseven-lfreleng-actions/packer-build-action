---
# SPDX-License-Identifier: Apache-2.0
# Test Packer Build with Legacy Auth Key

name: Test Packer Build (Legacy Auth Key)

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      packer_template:
        description: "Packer template to build"
        required: false
        type: string
        default: "builder.pkr.hcl"
      packer_vars:
        description: "Packer vars file"
        required: false
        type: string
        default: "ubuntu-22.04"
      debug_mode:
        description: "Enable debug logging"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - "examples/**"
      - "scripts/**"
      - "action.yaml"
      - ".github/workflows/test-build-authkey.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "examples/**"
      - "scripts/**"
      - "action.yaml"
      - ".github/workflows/test-build-authkey.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check for changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: check
        with:
          base: ${{ github.event.before || format('refs/heads/{0}', github.ref_name) }}
          filters: |
            has-changes:
              - 'examples/**'
              - 'scripts/**'
              - 'action.yaml'
              - '.github/workflows/**'

  test-packer-build:
    needs: prepare
    if: |
      (needs.prepare.outputs.has-changes == 'true' ||
      github.event_name == 'workflow_dispatch') &&
      (github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository) &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ========================================
      # Step 1: Setup Bastion with Legacy Auth Key
      # ========================================
      - name: Setup OpenStack Bastion with Tailscale (Auth Key)
        id: bastion
        uses: lfreleng-actions/tailscale-openstack-bastion-action@f9a42891917447909c6f52dadf025d6c4187d729 # main
        with:
          operation: setup
          tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          openstack_auth_url: ${{ secrets.OPENSTACK_AUTH_URL }}
          openstack_project_id: ${{ secrets.OPENSTACK_PROJECT_ID }}
          openstack_username: ${{ secrets.OPENSTACK_USERNAME }}
          openstack_password: ${{ secrets.OPENSTACK_PASSWORD_B64 }}
          openstack_region: ${{ secrets.OPENSTACK_REGION }}
          bastion_name: "packer-authkey-${{ github.run_id }}"
          bastion_flavor: "v3-standard-2"
          bastion_image: "Ubuntu 22.04.5 LTS (x86_64) [2025-03-27]"
          bastion_network: "odlci"
          debug_mode: ${{ inputs.debug_mode || 'false' }}

      # ========================================
      # Step 2: Run Packer Build Action
      # ========================================
      - name: Build Packer Image
        uses: ./
        with:
          mode: build
          packer_version: "1.11.2"
          packer_template: "examples/templates/builder.pkr.hcl"
          packer_vars_file: "examples/vars/ubuntu-22.04.pkrvars.hcl"
          path_prefix: "."
          bastion_ip: ${{ steps.bastion.outputs.bastion_ip }}
          bastion_ssh_user: "root"
          os_cloud: "openstack"
          openstack_auth_url: ${{ secrets.OPENSTACK_AUTH_URL }}
          openstack_project_id: ${{ secrets.OPENSTACK_PROJECT_ID }}
          openstack_username: ${{ secrets.OPENSTACK_USERNAME }}
          openstack_password: ${{ secrets.OPENSTACK_PASSWORD_B64 }}
          openstack_network_id: ${{ secrets.OPENSTACK_NETWORK_ID }}
          openstack_domain_name: ${{ secrets.OPENSTACK_DOMAIN_NAME }}

      # ========================================
      # Step 3: Teardown Bastion
      # ========================================
      - name: Teardown Bastion Host
        if: always()
        uses: lfreleng-actions/tailscale-openstack-bastion-action@f9a42891917447909c6f52dadf025d6c4187d729 # main
        with:
          operation: teardown
          bastion_name: "packer-authkey-${{ github.run_id }}"
          openstack_auth_url: ${{ secrets.OPENSTACK_AUTH_URL }}
          openstack_project_id: ${{ secrets.OPENSTACK_PROJECT_ID }}
          openstack_username: ${{ secrets.OPENSTACK_USERNAME }}
          openstack_password: ${{ secrets.OPENSTACK_PASSWORD_B64 }}
          openstack_region: ${{ secrets.OPENSTACK_REGION }}

  summary:
    if: always()
    needs: [prepare, test-packer-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Build summary
        run: |
          {
            echo "## Packer Build Test Summary - Legacy Auth Key"
            echo ""
            echo "**Authentication Method:** Legacy Tailscale Auth Key (Deprecated)"
            echo ""
            echo "- **Workflow:** ${{ github.workflow }}"
            echo "- **Run ID:** ${{ github.run_id }}"
            echo "- **Trigger:** ${{ github.event_name }}"
            echo "- **Branch:** ${{ github.ref_name }}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.test-packer-build.result }}" == "success" ]; then
            echo "✅ **Build Status:** Success" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.test-packer-build.result }}" == "skipped" ]; then
            echo "⏭️ **Build Status:** Skipped (no relevant changes)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ **Build Status:** Failed" >> "$GITHUB_STEP_SUMMARY"
          fi
