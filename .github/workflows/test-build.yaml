---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

name: Test Packer Build with Bastion

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths:
      - "action.yaml"
      - "examples/**"
      - ".github/workflows/test-build.yaml"
  # Fork PRs cannot access OpenStack/Tailscale secrets, so this suite is
  # shown but skipped on them by default. A maintainer can opt a fork PR
  # in by applying the 'safe to test' label: the entry job then runs via
  # the 'integration' environment (required reviewers), with the checkout
  # pinned to the PR head SHA. The workflow definition is always taken
  # from the base branch; untrusted PR code only executes after approval.
  pull_request_target:  # zizmor: ignore[dangerous-triggers]
    branches:
      - main
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "action.yaml"
      - "examples/**"
      - ".github/workflows/test-build.yaml"
  workflow_dispatch:
    inputs:
      template:
        description: "Packer template to build"
        required: true
        default: "templates/builder.pkr.hcl"
      vars_file:
        description: "Packer vars file"
        required: true
        default: "vars/ubuntu-22.04.pkrvars.hcl"

permissions:
  contents: read

concurrency:
  # Use a per-PR key for pull_request_target runs (github.ref is the base
  # branch ref under that event, so it would otherwise collide across PRs);
  # fall back to github.ref for push and workflow_dispatch.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    name: Integration Test - Build with Bastion
    # Runs on push, workflow_dispatch, and same-repo PRs automatically.
    # Fork PRs run only when a maintainer adds the 'safe to test' label
    # (otherwise the job is shown but skipped).
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request_target' &&
        (github.event.pull_request.head.repo.full_name == github.repository ||
         contains(github.event.pull_request.labels.*.name, 'safe to test'))))
    # Gate fork-PR runs behind the 'integration' environment (required
    # reviewers). Trusted events (push, dispatch, same-repo PRs) use the
    # unprotected 'integration-auto' environment, which has no reviewers
    # and runs without delay.
    # yamllint disable-line rule:line-length
    environment: ${{ (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) && 'integration' || 'integration-auto' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout packer-build-action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # For fork PRs this is the (reviewer-approved) PR head repo and
          # SHA; for push and same-repo events it falls back to the base
          # repository and triggering SHA.
          # yamllint disable-line rule:line-length
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: action-repo
          persist-credentials: false

      - name: Checkout test repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lfit/releng-common-packer
          path: target-repo
          submodules: recursive
          persist-credentials: false

      - name: Setup bastion
        id: bastion
        uses: lfreleng-actions/tailscale-openstack-bastion-action@8b215efdc8161157b7cdc717e2db6028e158d66b # v0.1.0
        with:
          operation: setup
          tailscale_oauth_client_id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale_oauth_secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          openstack_auth_url: ${{ secrets.OPENSTACK_AUTH_URL }}
          openstack_project_id: ${{ secrets.OPENSTACK_PROJECT_ID }}
          openstack_username: ${{ secrets.OPENSTACK_USERNAME }}
          openstack_password: ${{ secrets.OPENSTACK_PASSWORD_B64 }}
          openstack_region: ${{ secrets.OPENSTACK_REGION }}
          bastion_name: "packer-build-test-${{ github.run_id }}"
          bastion_flavor: "v3-standard-2"
          bastion_image: "Ubuntu 22.04.5 LTS (x86_64) [2025-03-27]"
          bastion_network: "odlci"
          bastion_wait_timeout: "300"

      - name: Build with Packer
        id: build
        uses: ./action-repo
        with:
          mode: build
          bastion_ip: ${{ steps.bastion.outputs.bastion_ip }}
          bastion_ssh_user: "root"
          packer_template: ${{ github.event.inputs.template || 'templates/builder.pkr.hcl' }}
          packer_vars_file: ${{ github.event.inputs.vars_file || 'vars/ubuntu-22.04.pkrvars.hcl' }}
          packer_working_dir: "."
          path_prefix: "target-repo"
          os_cloud: "openstack"
          openstack_auth_url: ${{ secrets.OPENSTACK_AUTH_URL }}
          openstack_project_id: ${{ secrets.OPENSTACK_PROJECT_ID }}
          openstack_username: ${{ secrets.OPENSTACK_USERNAME }}
          openstack_password: ${{ secrets.OPENSTACK_PASSWORD_B64 }}
          openstack_network_id: ${{ secrets.OPENSTACK_NETWORK_ID }}
          openstack_domain_name: ${{ secrets.OPENSTACK_DOMAIN_NAME }}
          packer_version: "1.11.2"
          python_version: "3.11"
          ansible_version: "9.2.0"

      - name: Teardown bastion
        if: always()
        uses: lfreleng-actions/tailscale-openstack-bastion-action@8b215efdc8161157b7cdc717e2db6028e158d66b # v0.1.0
        with:
          operation: teardown
          bastion_name: "packer-build-test-${{ github.run_id }}"
          openstack_auth_url: ${{ secrets.OPENSTACK_AUTH_URL }}
          openstack_project_id: ${{ secrets.OPENSTACK_PROJECT_ID }}
          openstack_username: ${{ secrets.OPENSTACK_USERNAME }}
          openstack_password: ${{ secrets.OPENSTACK_PASSWORD_B64 }}
          openstack_region: ${{ secrets.OPENSTACK_REGION }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## Test Results"
            echo "**Bastion IP:** ${{ steps.bastion.outputs.bastion_ip }}"
            echo "**Build Status:** ${{ steps.build.outputs.build_status }}"
            if [[ -n "${{ steps.build.outputs.image_name }}" ]]; then
              echo "**Image Name:** ${{ steps.build.outputs.image_name }}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
