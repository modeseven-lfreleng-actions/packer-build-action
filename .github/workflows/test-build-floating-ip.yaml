name: Test Packer Build with Floating IP (No Bastion)

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths:
      - "action.yaml"
      - "examples/**"
      - ".github/workflows/test-build-floating-ip.yaml"
  # Fork PRs cannot access OpenStack/Tailscale secrets, so this suite is
  # shown but skipped on them by default. A maintainer can opt a fork PR
  # in by applying the 'safe to test' label: the entry job then runs via
  # the 'integration' environment (required reviewers), with the checkout
  # pinned to the PR head SHA. The workflow definition is always taken
  # from the base branch; untrusted PR code only executes after approval.
  pull_request_target:  # zizmor: ignore[dangerous-triggers]
    branches:
      - main
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "action.yaml"
      - "examples/**"
      - ".github/workflows/test-build-floating-ip.yaml"
  workflow_dispatch:
    inputs:
      template:
        description: "Packer template to build"
        required: true
        default: "templates/builder.pkr.hcl"
      vars_file:
        description: "Packer vars file"
        required: true
        default: "vars/ubuntu-22.04.pkrvars.hcl"

permissions:
  contents: read

concurrency:
  # Use a per-PR key for pull_request_target runs (github.ref is the base
  # branch ref under that event, so it would otherwise collide across PRs);
  # fall back to github.ref for push and workflow_dispatch.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-test-floating-ip:
    name: Integration Test - Build with Floating IP
    # Runs on push, workflow_dispatch, and same-repo PRs automatically.
    # Fork PRs run only when a maintainer adds the 'safe to test' label
    # (otherwise the job is shown but skipped).
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request_target' &&
        (github.event.pull_request.head.repo.full_name == github.repository ||
         contains(github.event.pull_request.labels.*.name, 'safe to test'))))
    # Gate fork-PR runs behind the 'integration' environment (required
    # reviewers). Trusted events (push, dispatch, same-repo PRs) use the
    # unprotected 'integration-auto' environment, which has no reviewers
    # and runs without delay.
    # yamllint disable-line rule:line-length
    environment: ${{ (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) && 'integration' || 'integration-auto' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout packer-build-action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # For fork PRs this is the (reviewer-approved) PR head repo and
          # SHA; for push and same-repo events it falls back to the base
          # repository and triggering SHA.
          # yamllint disable-line rule:line-length
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: action-repo
          persist-credentials: false

      - name: Checkout test repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lfit/releng-common-packer
          ref: master
          path: target-repo
          submodules: recursive
          persist-credentials: false

      - name: Build with Packer (Floating IP mode)
        id: build
        uses: ./action-repo
        with:
          mode: build
          # NO bastion_ip - this forces use_floating_ip=true
          packer_template: ${{ github.event.inputs.template || 'templates/builder.pkr.hcl' }}
          packer_vars_file: ${{ github.event.inputs.vars_file || 'vars/ubuntu-22.04.pkrvars.hcl' }}
          packer_working_dir: "."
          path_prefix: "target-repo"
          os_cloud: "openstack"
          openstack_auth_url: ${{ secrets.OPENSTACK_AUTH_URL }}
          openstack_project_id: ${{ secrets.OPENSTACK_PROJECT_ID }}
          openstack_username: ${{ secrets.OPENSTACK_USERNAME }}
          openstack_password: ${{ secrets.OPENSTACK_PASSWORD_B64 }}
          openstack_network_id: ${{ secrets.OPENSTACK_NETWORK_ID }}
          openstack_domain_name: ${{ secrets.OPENSTACK_DOMAIN_NAME }}
          packer_version: "1.11.2"
          python_version: "3.11"
          ansible_version: "9.2.0"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Test Results - Floating IP Mode"
            echo ""
            echo "This test uses **floating IP** instead of bastion for SSH access."
            echo "The instance gets a public IP address and GitHub runner connects directly."
            echo ""
            echo "**Build Status:** ${STEPS_BUILD_OUTPUTS_BUILD_STATUS}"
            if [[ -n "${STEPS_BUILD_OUTPUTS_IMAGE_NAME}" ]]; then
              echo "**Image Name:** ${STEPS_BUILD_OUTPUTS_IMAGE_NAME}"
            fi
            echo ""
            if [[ "${STEPS_BUILD_OUTPUTS_BUILD_STATUS}" == "success" ]]; then
              echo "✅ **Floating IP mode works!**"
              echo ""
              echo "If bastion mode fails but floating IP works, the issue is network routing:"
              echo "- The Tailscale bastion cannot route to OpenStack's private network"
              echo "- Solution: Provision bastion VM inside OpenStack or continue using floating IPs"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
        env:
          STEPS_BUILD_OUTPUTS_BUILD_STATUS: ${{ steps.build.outputs.build_status }}
          STEPS_BUILD_OUTPUTS_IMAGE_NAME: ${{ steps.build.outputs.image_name }}
